<!DOCTYPE html>
<html>
<head>
    <title>任务状态 - {{ job_id }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .step-card { transition: all 0.3s; }
        .step-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .log-entry { border-bottom: 1px solid #eee; padding: 5px 0; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>任务状态: {{ job_id }}</h1>
            <a href="/" class="btn btn-outline-primary">返回首页</a>
        </div>
        
        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="card-title">整体进度</h5>
                    <span id="overallStatus" class="badge bg-secondary">{{ status.status }}</span>
                </div>
                <div class="progress mt-3" style="height: 20px;">
                    <div id="overallProgress" class="progress-bar" role="progressbar" 
                         style="width: {{ (status.steps | selectattr('status', 'equalto', 'completed') | list | length / 5 * 100 }}%">
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mb-4">
            {% for step in status.steps %}
            <div class="col-md-6 mb-3">
                <div class="card step-card h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="card-title">步骤 {{ step.id }}: {{ step.name }}</h5>
                                <p class="card-text text-muted mb-0">脚本: {{ step.script }}</p>
                            </div>
                            <span class="badge bg-{{ get_status_color(step.status) }}">{{ step.status }}</span>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">计算日志</h5>
            </div>
            <div class="card-body">
                <div id="logOutput" style="height: 300px; overflow-y: scroll;">
                    {% for log in status.logs %}
                    <div class="log-entry">{{ log }}</div>
                    {% endfor %}
                </div>
            </div>
        </div>
        
        {% if status.status == 'completed' %}
        <div class="mt-4 text-center">
            <a href="/download/{{ job_id }}" class="btn btn-success btn-lg">下载计算结果</a>
        </div>
        {% endif %}
    </div>

    <script>
        // 自动刷新页面
        function refreshPage() {
            if ("{{ status.status }}" !== "completed" && "{{ status.status }}" !== "failed") {
                setTimeout(() => {
                    location.reload();
                }, 10000); // 每10秒刷新一次
            }
        }
        
        // 页面加载完成后开始刷新
        document.addEventListener('DOMContentLoaded', refreshPage);
    </script>
</body>
</html>
