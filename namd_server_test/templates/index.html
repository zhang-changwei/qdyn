<!DOCTYPE html>
<html>
<head>
    <title>VASP-NAMD Workflow Automation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .workflow-step { 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 5px;
        }
        .step-pending { background-color: #e9ecef; }
        .step-running { background-color: #cff4fc; }
        .step-completed { background-color: #d1e7dd; }
        .step-failed { background-color: #f8d7da; }
        .status-badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <h1 class="mb-4">VASP-NAMD Automated Workflow</h1>
        
        <div class="card mb-4">
            <div class="card-header">Submit New Calculation</div>
            <div class="card-body">
                <form id="calculationForm">
                    <div class="mb-3">
                        <label class="form-label">Upload POSCAR File</label>
                        <input class="form-control" type="file" id="poscarFile" accept=".POSCAR,.vasp" required>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Work Path</label>
                            <input type="text" class="form-control" id="work_path" value="~/doc/job/">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Temperature (K)</label>
                            <input type="number" class="form-control" id="temperature" value="300" min="50">
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">WAVECAR Steps</label>
                            <input type="number" class="form-control" id="wavecar_steps" value="500" min="2">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Simulation Method</label>
                            <select class="form-select" id="simulation_method">
                                <option value="DISH">DISH</option>
                                <option value="FSSH">FSSH</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">INIBAND</label>
                            <input type="number" class="form-control" id="INIBAND" value="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Simulation Time (fs)</label>
                            <input type="number" class="form-control" id="simulation_time" value="1000" min="1">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Start Calculation</button>
                </form>
            </div>
        </div>
        
        <div id="jobStatusSection" style="display:none;">
            <h2 class="mb-3">Job Status: <span id="jobIdLabel"></span></h2>
            <div class="progress mb-4">
                <div id="overallProgress" class="progress-bar" role="progressbar" style="width: 0%"></div>
            </div>
            
            <div class="workflow-steps mb-4" id="workflowSteps">
                <!-- Steps will be dynamically added here -->
            </div>
            
            <div class="card">
                <div class="card-header">Real-time Logs</div>
                <div class="card-body">
                    <div id="logOutput" style="height: 200px; overflow-y: scroll; background-color: #f8f9fa; padding: 10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('calculationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('poscar', document.getElementById('poscarFile').files[0]);
            formData.append('vasp_nodes', document.getElementById('vaspNodes').value);
            formData.append('vasp_ntasks', document.getElementById('vaspTasks').value);
            formData.append('namd_nodes', document.getElementById('namdNodes').value);
            formData.append('namd_ntasks', document.getElementById('namdTasks').value);
            formData.append('temperature', document.getElementById('temperature').value);
            formData.append('simulation_time', document.getElementById('simulationTime').value);
            
            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                document.getElementById('jobIdLabel').textContent = data.job_id;
                document.getElementById('jobStatusSection').style.display = 'block';
                
                // 初始化工作流步骤显示
                initWorkflowSteps();
                
                // 开始轮询状态
                monitorJobStatus(data.job_id);
                
            } catch (error) {
                console.error('Submission failed:', error);
                alert('Failed to submit job: ' + error.message);
            }
        });
        
        function initWorkflowSteps() {
            const stepsContainer = document.getElementById('workflowSteps');
            stepsContainer.innerHTML = '';
            
            const workflowSteps = [
                '1. Structure Optimization (VASP)',
                '2. NVT Equilibrium (VASP)',
                '3. NVE Trajectory (VASP)',
                '4. WAVECAR Calculation (VASP)',
                '5. Hefei-NAMD Simulation'
            ];
            
            workflowSteps.forEach((step, index) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'workflow-step step-pending';
                stepDiv.id = `step-${index}`;
                stepDiv.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <h5>${step}</h5>
                        <span class="status-badge bg-secondary">Pending</span>
                    </div>
                    <div class="progress mt-2">
                        <div class="progress-bar" role="progressbar" style="width: 0%"></div>
                    </div>
                `;
                stepsContainer.appendChild(stepDiv);
            });
        }
        
        async function monitorJobStatus(jobId) {
            const logOutput = document.getElementById('logOutput');
            
            const updateStatus = async () => {
                try {
                    const response = await fetch(`/status_data/${jobId}`);
                    const status = await response.json();
                    
                    if (status.error) {
                        logOutput.innerHTML += `<div class="text-danger">${status.error}</div>`;
                        return;
                    }
                    
                    // 更新整体进度
                    const completedSteps = status.steps.filter(step => step.status === 'completed').length;
                    const progress = (completedSteps / 5) * 100;
                    document.getElementById('overallProgress').style.width = `${progress}%`;
                    
                    // 更新每个步骤状态
                    status.steps.forEach((step, index) => {
                        const stepElement = document.getElementById(`step-${index}`);
                        if (stepElement) {
                            stepElement.className = `workflow-step step-${step.status.toLowerCase()}`;
                            const badge = stepElement.querySelector('.status-badge');
                            badge.textContent = step.status.charAt(0).toUpperCase() + step.status.slice(1);
                            badge.className = `status-badge bg-${getStatusColor(step.status)}`;
                        }
                    });
                    
                    // 添加日志
                    if (status.logs) {
                        logOutput.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${status.logs}</div>`;
                        logOutput.scrollTop = logOutput.scrollHeight;
                    }
                    
                    // 如果任务未完成，继续轮询
                    if (status.status !== 'completed' && status.status !== 'failed') {
                        setTimeout(updateStatus, 5000); // 每5秒更新一次
                    }
                    
                } catch (error) {
                    console.error('Error fetching job status:', error);
                    logOutput.innerHTML += `<div class="text-danger">Error: ${error.message}</div>`;
                    setTimeout(updateStatus, 10000); // 10秒后重试
                }
            };
            
            await updateStatus();
        }
        
        function getStatusColor(status) {
            switch (status.toLowerCase()) {
                case 'pending': return 'secondary';
                case 'running': return 'info';
                case 'completed': return 'success';
                case 'failed': return 'danger';
                default: return 'secondary';
            }
        }
    </script>
</body>
</html>
