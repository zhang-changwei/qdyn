# qdyn.yaml — QDYN job manager configuration
# Place this file in the working directory or point to it with:
#   python main.py --server --config /path/to/qdyn.yaml
#   QDYN_CONFIG=/path/to/qdyn.yaml python main.py --server

basic:
  jf_project_path: "config/jf_qdyn.yaml"
  jf_project_name: "jf_qdyn"
  user_db_path: "data/qdyn_users.db"
  mongo_dir: "mongo/"

machine:
  # SLURM partition (queue) to submit jobs to
  partition: chu

  # CPU cores per node
  cpus_per_node: 64

# Execution Configs
modules: 
  vasp: ['compiler/oneAPI/2023.2.0', 'vasp/6.5.1']
  python: []
  namd: []

export: 
  vasp: {}
  python: {}
  namd: {}

pre_run:
  vasp: 'source ~/src/qdyn/.venv/bin/activate'
  python: 'source ~/src/qdyn/.venv/bin/activate'
  namd: 'source ~/src/qdyn/.venv/bin/activate'

# Resource Files
pp_path:
  vasp: '~/src/vasp-pp'

orb_path:
  vasp: ''

# Slurm Job Resources
nvt:
  vasp:
    nodes: 1
    ntasks_per_node: 64
    cpus_per_task: 1

nve:
  vasp:
    nodes: 1
    ntasks_per_node: 64
    cpus_per_task: 1

scf:
  vasp:
    nodes: 1
    ntasks_per_node: 64
    cpus_per_task: 1


auth:
  secret_key: ""                  # leave empty to auto-generate on first start
  token_expire_hours: 24
