# qdyn.yaml — QDYN job manager configuration
# Place this file in the working directory or point to it with:
#   python main.py --server --config /path/to/qdyn.yaml
#   QDYN_CONFIG=/path/to/qdyn.yaml python main.py --server

basic:
  workflow_poll_interval: 10

machine:
  # SLURM partition (queue) to submit jobs to
  partition: queue1-1

  # CPU cores per node
  cpus_per_node: 64

module: 
  vasp: ['compiler/intel/2021.3.0', 'mpi/intelmpi/2021.3.0']
  python: []

export: 
  vasp:
    PATH: 'balabala'
    LD_LIBRARY_PATH: 'balabala'
  python:
    PATH: 'balabala'


pp_path:
  vasp: ''

orb_path:
  vasp: ''
  
nvt:
  vasp:
    nodes: 2
    ntasks_per_node: 64
    cpus_per_task: 1

nve:
  vasp:
    nodes: 2
    ntasks_per_node: 64
    cpus_per_task: 1

auth:
  single_user_mode: false         # set true to disable auth (no login, no DB)
  secret_key: ""                  # leave empty to auto-generate on first start
  user_db_path: "data/qdyn_users.db"
  token_expire_hours: 24
